name: Sync → Repo Neutro

on:
  push:
    branches: [main]
    paths:
      - 'index.html'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo SHVCB5
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git source

      - name: Generar index.html neutro
        run: |
          cp source/index.html index-neutro.html

          # Reemplazar códigos de tienda SHVCB5
          sed -i 's|https://ww1\.lifeplus\.com/SHVCB5/M/es/es/web-page/products?search=pets|https://ww1.lifeplus.com/es/es/web-page/products?search=pets|g' index-neutro.html
          sed -i 's|https://www\.lifeplus\.com/SHVCB5/S/|https://www.lifeplus.com/|g' index-neutro.html
          sed -i 's|ShopID SHVCB5|LifePlus International|g' index-neutro.html
          sed -i 's|<strong>SHVCB5</strong>|LifePlus International|g' index-neutro.html

          # Eliminar bloques marcados con NEUTRO-REMOVE (formulario y JS asociado)
          python3 - <<'EOF'
import re

with open('index-neutro.html', 'r', encoding='utf-8') as f:
    content = f.read()

# Eliminar bloques entre marcadores HTML <!-- NEUTRO-REMOVE-START --> ... <!-- NEUTRO-REMOVE-END -->
content = re.sub(
    r'<!--\s*NEUTRO-REMOVE-START\s*-->.*?<!--\s*NEUTRO-REMOVE-END\s*-->',
    '',
    content,
    flags=re.DOTALL
)

# Eliminar bloques entre marcadores JS /* NEUTRO-REMOVE-START */ ... /* NEUTRO-REMOVE-END */
content = re.sub(
    r'/\*\s*NEUTRO-REMOVE-START\s*\*/.*?/\*\s*NEUTRO-REMOVE-END\s*\*/',
    '',
    content,
    flags=re.DOTALL
)

with open('index-neutro.html', 'w', encoding='utf-8') as f:
    f.write(content)

print("Bloques NEUTRO-REMOVE eliminados correctamente")
EOF

      - name: Push al repo neutro
        env:
          NEUTRO_TOKEN: ${{ secrets.NEUTRO_TOKEN }}
        run: |
          git clone https://x-access-token:${NEUTRO_TOKEN}@github.com/peterestelaweb/lifepluspetsneutro.git neutro

          cp index-neutro.html neutro/index.html

          cd neutro
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "sync: actualización automática desde lifepluspetspain.com"
          git push origin main
